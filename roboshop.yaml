# ansible-playbook -i localhost,   -e '{"instances":["mongodb","catalogue","redis","user","cart","mysql","shipping","rabbitmq","payment","frontend"]}'  -e action=destroy roboshop.yaml
# In you are not defining any action, for ex: action=create or destroy, by default it will consider ad create action.
- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-00329eaa2a9c24c6f
    ami_id: ami-0220d79f3f480ecf5
    domain_name: jcglobalit.online
    env: dev
    action: create
    instances:
      - mongodb
      - catalogue
  tasks:
    ### CREATE ###
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        name: "{{ item }}-{{ env }}"
        tags:
          Project: roboshop
          Component: "{{ item }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output
      when: action == "create"

    - name: Print the ec2_output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"
      when: action == "create"

    - name: Create route53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ env }}.{{ domain_name }}" # ex: mongodb-dev.jcglobalit.online
        # In the record it will read from ec2_output file and creates the r53 record
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        wait: true
        overwrite: true # It will remove or overwrite the existing records
      loop: "{{ ec2_output.results }}"  # It will read the ec2_output.json file's results block and the results block
      when: action == "create"

    - name: Create route53 record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "roboshop-{{ env }}.{{ doman_name }}"   # roboshop-dev.jcglobalit.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        wait: true
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when:
      - item.item == "frontend"
      - action == "create"

    ### DESTROY ###

    - name: delete r53 records for frontend
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "roboshop-{{ env }}.{{ domain_name }}" # roboshop-dev.jcglobalit.online
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: # and
        - item == "frontend"
        - action == "destroy"

    - name: delete r53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item }}-{{ env }}.{{ domain_name }}" # roboshop-dev.jcglobalit.online
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: action == "destroy"

    - name: delete ec2 instance
      amazon.aws.ec2_instance:
        state: absent
        name: "{{ item }}-{{ env }}"
        wait: false
      loop: "{{ instances }}"
      when: action == "destroy"


